name: Deploy to dev

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-dev
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: [self-hosted, home-server]
    environment: dev
    timeout-minutes: 15
    env:
      DEPLOY_DIR: /home/gha-runner/deploy/sanalabo-automation/dev
      REPO_URL: https://github.com/Sana-Labo/sanalabo-automation.git
      SERVICE: assistant
    steps:
      - name: Bootstrap deploy dir (idempotent)
        run: |
          if [ ! -d "$DEPLOY_DIR/.git" ]; then
            mkdir -p "$DEPLOY_DIR"
            git init "$DEPLOY_DIR"
            git -C "$DEPLOY_DIR" remote add origin "$REPO_URL"
          fi

      - name: Fetch target SHA
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Runner 호스트의 system/global gitconfig를 무시하여 url.*.insteadOf 등의 rewrite
          # (예: https://github.com/ → git@github.com:) 에 의존하지 않도록 격리한다.
          GIT_CONFIG_GLOBAL: /dev/null
          GIT_CONFIG_SYSTEM: /dev/null
        run: |
          # remote "origin" 경유가 아니라 REPO_URL을 인자로 직접 전달하여
          # .git/config에 저장된 URL의 영향을 완전히 배제한다. actions/checkout과
          # 동일하게 http.extraheader + basic x-access-token 패턴으로 authenticated
          # HTTPS fetch를 수행한다. (URL-scoped 키는 쉘 -c 한 줄 전달 시 파서가
          # subsection 경계를 오인하여 헤더가 적용되지 않는 문제가 있어 unscoped 사용)
          AUTH_HEADER="AUTHORIZATION: basic $(printf 'x-access-token:%s' "$GH_TOKEN" | base64 -w0)"
          git -C "$DEPLOY_DIR" \
            -c "http.extraheader=$AUTH_HEADER" \
            fetch --depth=1 "$REPO_URL" "$GITHUB_SHA"
          git -C "$DEPLOY_DIR" reset --hard "$GITHUB_SHA"
          echo "Deployed tree: $(git -C "$DEPLOY_DIR" log -1 --oneline)"

      - name: Render .env from individual secrets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_CHANNEL_SECRET: ${{ secrets.LINE_CHANNEL_SECRET }}
          SYSTEM_ADMIN_IDS: ${{ secrets.SYSTEM_ADMIN_IDS }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
          TOKEN_ENCRYPTION_KEY: ${{ secrets.TOKEN_ENCRYPTION_KEY }}
        run: |
          umask 077
          # 필수 secret 누락 시 즉시 실패 (어느 키가 비어있는지 에러로 식별)
          : "${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY secret is missing or empty}"
          : "${LINE_CHANNEL_ACCESS_TOKEN:?LINE_CHANNEL_ACCESS_TOKEN secret is missing or empty}"
          : "${LINE_CHANNEL_SECRET:?LINE_CHANNEL_SECRET secret is missing or empty}"
          : "${SYSTEM_ADMIN_IDS:?SYSTEM_ADMIN_IDS secret is missing or empty}"
          : "${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID secret is missing or empty}"
          : "${GOOGLE_CLIENT_SECRET:?GOOGLE_CLIENT_SECRET secret is missing or empty}"
          : "${GOOGLE_REDIRECT_URI:?GOOGLE_REDIRECT_URI secret is missing or empty}"
          : "${TOKEN_ENCRYPTION_KEY:?TOKEN_ENCRYPTION_KEY secret is missing or empty}"
          # printf로 조립 — 각 secret은 GitHub Actions가 로그에서 개별 마스킹
          {
            printf 'ANTHROPIC_API_KEY=%s\n' "$ANTHROPIC_API_KEY"
            printf 'LINE_CHANNEL_ACCESS_TOKEN=%s\n' "$LINE_CHANNEL_ACCESS_TOKEN"
            printf 'LINE_CHANNEL_SECRET=%s\n' "$LINE_CHANNEL_SECRET"
            printf 'SYSTEM_ADMIN_IDS=%s\n' "$SYSTEM_ADMIN_IDS"
            printf 'GOOGLE_CLIENT_ID=%s\n' "$GOOGLE_CLIENT_ID"
            printf 'GOOGLE_CLIENT_SECRET=%s\n' "$GOOGLE_CLIENT_SECRET"
            printf 'GOOGLE_REDIRECT_URI=%s\n' "$GOOGLE_REDIRECT_URI"
            printf 'TOKEN_ENCRYPTION_KEY=%s\n' "$TOKEN_ENCRYPTION_KEY"
            printf 'PORT=3000\n'
          } > "$DEPLOY_DIR/.env"
          chmod 600 "$DEPLOY_DIR/.env"
          echo ".env rendered: $(wc -l < "$DEPLOY_DIR/.env") lines, $(stat -c '%a' "$DEPLOY_DIR/.env") perms"

      - name: Build image
        working-directory: ${{ env.DEPLOY_DIR }}
        run: docker compose build --pull "$SERVICE"

      - name: Start service with healthcheck wait
        working-directory: ${{ env.DEPLOY_DIR }}
        run: docker compose up -d --wait "$SERVICE"

      - name: Report container status
        if: always()
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          docker compose ps "$SERVICE"
          docker compose logs --tail=50 --no-color "$SERVICE" || true

      - name: Prune images older than 7 days
        if: success()
        run: docker image prune --force --filter "until=168h"
