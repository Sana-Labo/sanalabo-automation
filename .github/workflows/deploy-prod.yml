name: Deploy to prod

on:
  push:
    branches: [main]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write  # required to request the GitHub OIDC token for Vault JWT auth

jobs:
  deploy:
    runs-on: [self-hosted, home-server]
    environment: prod
    timeout-minutes: 15
    env:
      DEPLOY_DIR: /home/gha-runner/deploy/sanalabo-automation/prod
      REPO_URL: https://github.com/Sana-Labo/sanalabo-automation.git
      SERVICE: assistant
      # Compose project name을 명시하여 컨테이너가 `sanalabo-automation-prod-<service>-N`으로
      # 명명되도록 한다. 미지정 시 Compose는 DEPLOY_DIR의 말단 디렉터리(`prod`)를 기본값으로
      # 사용하여 `prod-assistant-1`이 되며, dev와 시각적으로 구분되지 않는다.
      COMPOSE_PROJECT_NAME: sanalabo-automation-prod
      # Image registry-qualified 이름과 커밋 SHA 태그. compose 파일의
      # ${IMAGE_TAG:-local}과 짝을 이루어 빌드 출력이
      # sanalabo-automation/assistant:<full-sha>로 태그되도록 한다. 이 이름으로
      # 어떤 커밋이 실행 중인지 `docker images`에서 즉시 식별 가능하다.
      # IMAGE_KEEP은 prune 이후 호스트에 유지할 SHA 태그 이미지 수.
      IMAGE_REPO: sanalabo-automation/assistant
      IMAGE_TAG: ${{ github.sha }}
      IMAGE_KEEP: "5"
      # GitHub Actions는 2026-06-02부터 Node.js 20 기반 JavaScript action을 Node.js 24
      # 런타임으로 강제 승격하고, 2026-09-16에 Node 20 런타임을 제거한다. 현재 사용 중인
      # hashicorp/vault-action@v3(v3.4.0)는 action.yml의 runs.using이 여전히 node20이지만,
      # 번들된 dist/index.js는 이미 Node 24에서 동작 가능한 것으로 업스트림에서 확인됨
      # (issue #594). 공식 opt-in 플래그로 지금부터 Node 24로 실행해 deprecation warning을
      # 제거하고 6월 전환도 무중단으로 통과한다. vault-action 상위 버전 릴리스 후 제거.
      # 참고: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Bootstrap deploy dir (idempotent)
        run: |
          if [ ! -d "$DEPLOY_DIR/.git" ]; then
            mkdir -p "$DEPLOY_DIR"
            git init "$DEPLOY_DIR"
            git -C "$DEPLOY_DIR" remote add origin "$REPO_URL"
          fi

      - name: Fetch target SHA
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Runner 호스트의 system/global gitconfig를 무시하여 url.*.insteadOf 등의 rewrite
          # (예: https://github.com/ → git@github.com:) 에 의존하지 않도록 격리한다.
          GIT_CONFIG_GLOBAL: /dev/null
          GIT_CONFIG_SYSTEM: /dev/null
        run: |
          # remote "origin" 경유가 아니라 REPO_URL을 인자로 직접 전달하여
          # .git/config에 저장된 URL의 영향을 완전히 배제한다. actions/checkout과
          # 동일하게 http.extraheader + basic x-access-token 패턴으로 authenticated
          # HTTPS fetch를 수행한다. (URL-scoped 키는 쉘 -c 한 줄 전달 시 파서가
          # subsection 경계를 오인하여 헤더가 적용되지 않는 문제가 있어 unscoped 사용)
          AUTH_HEADER="AUTHORIZATION: basic $(printf 'x-access-token:%s' "$GH_TOKEN" | base64 -w0)"
          git -C "$DEPLOY_DIR" \
            -c "http.extraheader=$AUTH_HEADER" \
            fetch --depth=1 "$REPO_URL" "$GITHUB_SHA"
          git -C "$DEPLOY_DIR" reset --hard "$GITHUB_SHA"
          echo "Deployed tree: $(git -C "$DEPLOY_DIR" log -1 --oneline)"

      - name: Fetch secrets from Vault
        id: vault
        uses: hashicorp/vault-action@v3
        with:
          url: http://127.0.0.1:8200
          method: jwt
          role: gha-prod
          jwtGithubAudience: https://vault.onprem.local
          # Confine values to step outputs; do not spread to the job-level process env.
          exportEnv: false
          # TOKEN_ENCRYPTION_KEY은 PR 4-a에서 제거되었다. at-rest 암호화는 앱이 직접
          # 키를 들고 있지 않고 vault-agent sidecar → Vault Transit으로 수행하며,
          # 에이전트의 AppRole 크레덴셜(VAULT_ROLE_ID/SECRET_ID)만 여기서 fetch한다.
          secrets: |
            secret/data/prod/ANTHROPIC_API_KEY value | ANTHROPIC_API_KEY ;
            secret/data/prod/LINE_CHANNEL_ACCESS_TOKEN value | LINE_CHANNEL_ACCESS_TOKEN ;
            secret/data/prod/LINE_CHANNEL_SECRET value | LINE_CHANNEL_SECRET ;
            secret/data/prod/SYSTEM_ADMIN_IDS value | SYSTEM_ADMIN_IDS ;
            secret/data/prod/GOOGLE_CLIENT_ID value | GOOGLE_CLIENT_ID ;
            secret/data/prod/GOOGLE_CLIENT_SECRET value | GOOGLE_CLIENT_SECRET ;
            secret/data/prod/GOOGLE_REDIRECT_URI value | GOOGLE_REDIRECT_URI ;
            secret/data/prod/VAULT_ROLE_ID value | VAULT_ROLE_ID ;
            secret/data/prod/VAULT_SECRET_ID value | VAULT_SECRET_ID ;

      - name: Render .env from Vault values
        env:
          ANTHROPIC_API_KEY: ${{ steps.vault.outputs.ANTHROPIC_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ steps.vault.outputs.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_CHANNEL_SECRET: ${{ steps.vault.outputs.LINE_CHANNEL_SECRET }}
          SYSTEM_ADMIN_IDS: ${{ steps.vault.outputs.SYSTEM_ADMIN_IDS }}
          GOOGLE_CLIENT_ID: ${{ steps.vault.outputs.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ steps.vault.outputs.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI: ${{ steps.vault.outputs.GOOGLE_REDIRECT_URI }}
        run: |
          umask 077
          {
            printf 'ANTHROPIC_API_KEY=%s\n' "$ANTHROPIC_API_KEY"
            printf 'LINE_CHANNEL_ACCESS_TOKEN=%s\n' "$LINE_CHANNEL_ACCESS_TOKEN"
            printf 'LINE_CHANNEL_SECRET=%s\n' "$LINE_CHANNEL_SECRET"
            printf 'SYSTEM_ADMIN_IDS=%s\n' "$SYSTEM_ADMIN_IDS"
            printf 'GOOGLE_CLIENT_ID=%s\n' "$GOOGLE_CLIENT_ID"
            printf 'GOOGLE_CLIENT_SECRET=%s\n' "$GOOGLE_CLIENT_SECRET"
            printf 'GOOGLE_REDIRECT_URI=%s\n' "$GOOGLE_REDIRECT_URI"
            printf 'PORT=3000\n'
          } > "$DEPLOY_DIR/.env"
          chmod 600 "$DEPLOY_DIR/.env"
          # Sanity check: non-empty and not obviously corrupted.
          if [ ! -s "$DEPLOY_DIR/.env" ]; then
            echo "::error::.env is empty after render (Vault fetch may have returned empty values)"
            exit 1
          fi
          echo ".env rendered: $(wc -l < "$DEPLOY_DIR/.env") lines, $(stat -c '%a' "$DEPLOY_DIR/.env") perms"

      - name: Render AppRole credentials for vault-agent sidecar
        env:
          VAULT_ROLE_ID: ${{ steps.vault.outputs.VAULT_ROLE_ID }}
          VAULT_SECRET_ID: ${{ steps.vault.outputs.VAULT_SECRET_ID }}
        run: |
          # The vault-agent container reads these files at startup to perform
          # AppRole auto-auth. The runner (gha-runner) owns the files; the
          # hashicorp/vault image's default non-root user (uid 100) cannot
          # share that uid without sudo. Files are therefore mode 0644
          # (world-readable) so the container user can read the mounted
          # copies, while the parent directory is 0700 to block any host-
          # side lateral access — directory traversal requires +x on every
          # ancestor, so others cannot see or stat the files.
          umask 077
          mkdir -p "$DEPLOY_DIR/vault-secrets"
          chmod 700 "$DEPLOY_DIR/vault-secrets"
          printf '%s' "$VAULT_ROLE_ID"  > "$DEPLOY_DIR/vault-secrets/role-id"
          printf '%s' "$VAULT_SECRET_ID" > "$DEPLOY_DIR/vault-secrets/secret-id"
          chmod 644 "$DEPLOY_DIR/vault-secrets/role-id" "$DEPLOY_DIR/vault-secrets/secret-id"
          # Sanity check — empty files would make auto-auth fail silently with
          # 'missing role_id' only after the container spins up.
          [ -s "$DEPLOY_DIR/vault-secrets/role-id" ]   || { echo "::error::role-id is empty";   exit 1; }
          [ -s "$DEPLOY_DIR/vault-secrets/secret-id" ] || { echo "::error::secret-id is empty"; exit 1; }

      - name: Capture previous image for rollback
        id: prev
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          # 현재 실행 중 컨테이너의 image digest(sha256). 초기 배포라 컨테이너가
          # 없으면 빈 문자열. `compose ps -q`는 project+service 레이블로
          # 컨테이너를 찾으므로 IMAGE_TAG가 이미 새 SHA로 바뀌어 있어도 동작한다.
          # 이 단계에서 식별된 digest가 후속 rollback 단계의 복구 기준이 된다.
          cid=$(docker compose ps -q "$SERVICE" 2>/dev/null | head -n1 || true)
          if [ -n "$cid" ]; then
            prev=$(docker inspect -f '{{.Image}}' "$cid" 2>/dev/null || true)
          else
            prev=""
          fi
          echo "prev=$prev" >> "$GITHUB_OUTPUT"
          echo "previous image: ${prev:-<none, initial deploy>}"

      - name: Build image
        working-directory: ${{ env.DEPLOY_DIR }}
        run: docker compose build --pull "$SERVICE"

      - name: Start service with healthcheck wait
        working-directory: ${{ env.DEPLOY_DIR }}
        run: docker compose up -d --wait "$SERVICE"

      - name: Report container status
        if: always()
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          docker compose ps "$SERVICE"
          docker compose logs --tail=50 --no-color "$SERVICE" || true

      - name: Rollback to previous image on healthcheck failure
        if: failure() && steps.prev.outputs.prev != ''
        working-directory: ${{ env.DEPLOY_DIR }}
        env:
          # job-level IMAGE_TAG(신규 SHA)을 이 step에서만 `rollback`으로 덮어써
          # compose가 image 필드를 sanalabo-automation/assistant:rollback으로
          # 해석하게 한다. job-level 변수 자체는 매 run마다 github.sha에서 다시
          # 주입되므로 이후 배포에 영향 없음.
          IMAGE_TAG: rollback
        run: |
          PREV='${{ steps.prev.outputs.prev }}'
          # 이전 image의 content-addressed ID에 :rollback 태그를 부여한다.
          # PR 4-c 이전 배포의 `latest` 태그 이미지도 digest 기반이라 동일하게
          # 동작한다. compose up --wait은 실패 중인 컨테이너를 제거하고
          # :rollback 태그 이미지로 재생성하여 healthcheck를 기다린다.
          docker tag "$PREV" "${IMAGE_REPO}:rollback"
          docker compose up -d --wait "$SERVICE"
          echo "::warning::New deploy failed healthcheck; rolled back to previous image ($PREV)"

      - name: Prune old SHA-tagged images
        if: success()
        run: |
          # 호스트에 유지할 SHA 태그 이미지는 최신 IMAGE_KEEP개만. GitHub SHA는
          # 40자 16진이므로 awk 필터로 `local`/`rollback` 같은 보호 태그와 구분
          # 한다. `docker images`는 기본 최신순이므로 tail -n +KEEP+1은 오래된
          # 대상만 선별한다. 마지막 prune은 재빌드로 남은 dangling layer 정리.
          docker images "$IMAGE_REPO" --format '{{.Tag}}' \
            | awk '/^[0-9a-f]{40}$/' \
            | tail -n +$((IMAGE_KEEP + 1)) \
            | while IFS= read -r tag; do
                docker rmi "${IMAGE_REPO}:${tag}" 2>/dev/null || true
              done
          docker image prune -f
