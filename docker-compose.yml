services:
  assistant:
    build: .
    env_file: .env
    volumes:
      - gws-config:/root/.config/gws
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    restart: unless-stopped

volumes:
  gws-config:
