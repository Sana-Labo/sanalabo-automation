services:
  assistant:
    build: .
    env_file: .env
    volumes:
      - user-data:/app/data
    networks: [cf_tunnel, default]
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/health').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  user-data:

networks:
  cf_tunnel:
    external: true
